varp: 0.1.0

# --- Core: what exists, how it connects ---

shared:
  path: ./packages/varp/src/shared
  tags: [core]
  stability: stable

manifest:
  path: ./packages/varp/src/manifest
  deps: [shared, kiste]
  tags: [core]
  stability: stable

analysis:
  path: ./packages/varp/src/analysis
  deps: [shared, manifest]
  tags: [core]
  stability: stable

# --- Orchestration: tasks in, dependency graph out ---

scheduler:
  path: ./packages/varp/src/scheduler
  deps: [shared]
  tags: [orchestration]
  stability: stable

# --- Deprecated: plan lifecycle (to be removed) ---

plan:
  path: ./packages/varp/src/plan
  deps: [shared]
  tags: [deprecated]
  stability: experimental

enforcement:
  path: ./packages/varp/src/enforcement
  deps: [shared]
  tags: [deprecated]
  stability: experimental

execution:
  path: ./packages/varp/src/execution
  deps: [shared]
  tags: [deprecated]
  stability: experimental

# --- Surface: MCP server, CLI ---

mcp:
  path: ./packages/varp/src/mcp
  deps: [shared, manifest, plan, scheduler, enforcement, analysis, execution]
  tags: [surface]
  stability: stable

skills:
  path: ./packages/varp/skills
  deps: [manifest]
  tags: [plugin]
  stability: stable

hooks:
  path: ./packages/varp/hooks
  deps: [manifest]
  tags: [plugin]
  stability: stable

audit:
  path: ./packages/audit/src
  deps: [shared, execution, manifest]
  tags: [audit]
  stability: experimental
  docs:
    - ./packages/audit/docs/design.md

cli:
  path: ./packages/varp/src/cli
  deps: [shared, manifest, plan, scheduler, enforcement, analysis, execution, mcp]
  tags: [surface]
  stability: experimental

kart:
  paths: [packages/kart/src]
  stability: experimental
  doc: packages/kart/design.md
  tags: [code-intelligence]

kiste:
  paths: [packages/kiste/src]
  stability: experimental
  tags: [code-intelligence]

havn:
  paths: [packages/havn]
  stability: experimental
  tags: [plugin]
